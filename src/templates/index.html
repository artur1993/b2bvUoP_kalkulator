<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator B2B vs UoP IT 2025</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Kalkulator B2B vs UoP IT 2025</h1>

        <form id="calculator-form">
            <div class="row">
                <!-- B2B Column -->
                <div class="col-md-6">
                    <h2>B2B</h2>
                    <div class="mb-3">
                        <label for="b2b_faktura" class="form-label">Miesięczna stawka na fakturze (netto, PLN)</label>
                        <input type="number" class="form-control" id="b2b_faktura" value="21000" required>
                    </div>
                    <div class="mb-3">
                        <label for="b2b_opodatkowanie" class="form-label">Forma opodatkowania</label>
                        <select class="form-select" id="b2b_opodatkowanie">
                            <option value="ryczalt_IT">Ryczałt 12% (IT)</option>
                            <option value="liniowy">Liniowy 19%</option>
                            <option value="skala">Skala podatkowa</option>
                            <option value="ip_box">IP Box 5%</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="b2b_zus" class="form-label">Rodzaj ZUS</label>
                        <select class="form-select" id="b2b_zus">
                            <option value="pelny">Pełny ZUS</option>
                            <option value="preferencyjny">Preferencyjny</option>
                            <option value="ulga_na_start">Ulga na start</option>
                        </select>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="b2b_chorobowe" checked>
                        <label class="form-check-label" for="b2b_chorobowe">Dobrowolne chorobowe</label>
                    </div>
                    <div class="mb-3">
                        <label for="b2b_koszty" class="form-label">Miesięczne koszty stałe firmy (PLN)</label>
                        <input type="number" class="form-control" id="b2b_koszty" value="600">
                    </div>
                     <div class="mb-3">
                        <label class="form-label">Wybierz benefity do samodzielnego zakupu</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="opieka_medyczna" id="b2b_benefit_med" checked>
                            <label class="form-check-label" for="b2b_benefit_med">Opieka medyczna</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="karta_sportowa" id="b2b_benefit_sport" checked>
                            <label class="form-check-label" for="b2b_benefit_sport">Karta sportowa</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="sprzet" id="b2b_benefit_sprzet" checked>
                            <label class="form-check-label" for="b2b_benefit_sprzet">Sprzęt</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="b2b_przestoje" class="form-label">Przewidywane miesiące przestoju rocznie</label>
                        <input type="number" class="form-control" id="b2b_przestoje" value="1.5" step="0.1">
                    </div>
                    <div class="mb-3">
                        <label for="b2b_urlop" class="form-label">Planowane dni "urlopu" rocznie</label>
                        <input type="number" class="form-control" id="b2b_urlop" value="24">
                    </div>
                </div>

                <!-- UoP Column -->
                <div class="col-md-6">
                    <h2>UoP</h2>
                    <div class="mb-3">
                        <label for="uop_brutto" class="form-label">Wynagrodzenie brutto (PLN)</label>
                        <input type="number" class="form-control" id="uop_brutto" value="16500" required>
                    </div>
                    <div class="mb-3">
                        <label for="uop_koszty_przychodu" class="form-label">Koszty uzyskania przychodu (PLN)</label>
                        <input type="number" class="form-control" id="uop_koszty_przychodu" value="250">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Otrzymywane benefity</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="opieka_medyczna" id="uop_benefit_med" checked>
                            <label class="form-check-label" for="uop_benefit_med">Opieka medyczna</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="ppk" id="uop_benefit_ppk" checked>
                            <label class="form-check-label" for="uop_benefit_ppk">PPK</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="budzet_szkoleniowy" id="uop_benefit_szkolenia" checked>
                            <label class="form-check-label" for="uop_benefit_szkolenia">Budżet szkoleniowy</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Shared Fields -->
            <div class="row mt-4">
                <div class="col-md-6">
                    <h2>Wspólne</h2>
                     <div class="mb-3">
                        <label for="wiek" class="form-label">Wiek</label>
                        <input type="number" class="form-control" id="wiek" value="32">
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="ulga_dla_mlodych">
                        <label class="form-check-label" for="ulga_dla_mlodych">Ulga dla młodych (do 26 lat)</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4">Oblicz</button>
        </form>

        <div id="results" class="mt-5" style="display: none;">
            <h2>Wyniki</h2>
            <pre id="json-output" class="bg-light p-3 rounded"></pre>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
